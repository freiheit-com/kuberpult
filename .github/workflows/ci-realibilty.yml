name: Test CI Realibility

on:
  schedule:
    # Run on workdays at 8:00 AM
    - cron: '0 8 * * 1-5'
  push:
    branches:
      - db-prtest

jobs:
  open-pr:
    name: Open Pull Request
    permissions:
      pull-requests: write
      contents: write
    runs-on: ubuntu-latest
    outputs:
      pr_url: ${{ steps.open-pr.outputs.pr_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Open Pull Request
        id: open-pr
        run: |
          BASE_BRANCH=main
          SOURCE_BRANCH=automated/ci-realibility/cd-service

          # close existing PR
          PR_URL=$(gh pr list --head $SOURCE_BRANCH --base $BASE_BRANCH --json url --jq '.[0].url')
          if [ -n "$PR_URL" ]; then
            echo "The PR already exists. Close the current PR before creating a new one."
            gh pr close $PR_URL
          fi

          # delete existing testing branch
          git push origin --delete $SOURCE_BRANCH || true

          # create testing branch with changes
          git checkout $BASE_BRANCH
          git checkout -b $SOURCE_BRANCH

          echo -e "\nfunc TestCIRealibility() {}\n" >> services/cd-service/cmd/server/main.go
          git add services/cd-service/cmd/server/main.go

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m $'Automated: Test CI realibility for '"$SOURCE_BRANCH"'\n\nrequest-checks: true'
          git push origin $SOURCE_BRANCH

          # create PR
          gh pr create \
            --head $SOURCE_BRANCH \
            --base $BASE_BRANCH \
            --fill-first \
            --draft
          PR_URL=$(gh pr list --head $SOURCE_BRANCH --base $BASE_BRANCH --json url --jq '.[0].url')
          if [ -z "$PR_URL" ]; then
            echo "The PR cannot be created."
            exit 1
          fi
          echo "Created new PR: $PR_URL"
          echo "PR_URL=$PR_URL" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  check-ci:
    timeout-minutes: 30
    needs: open-pr
    name: Check CI status
    permissions:
      checks: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check CI status
        run: |
          exit_code=$(gh pr checks "${{ needs.open-pr.outputs.pr_url }}" --watch)
          if [ $exit_code -ne 0 ]; then
            echo "CI checks failed."
            exit 1
          fi
          echo "CI checks passed."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
