name: Test CI Realibility

on:
  schedule:
    # Run on workdays at 8:00 AM
    - cron: '0 8 * * 1-5'
  push:
    branches:
      - db-prtest

jobs:
  prtest-1:
    name: Test CI realibility for cd-service
    uses: ./.github/workflows/ci-realibilty-snippet.yml
    with:
      source_branch: automated/ci-realibility/prtest-1
      modify_cd_service: true
      check_new_image_cd_service: true
    secrets: inherit
  prtest-2:
    needs: [prtest-1]
    name: Test CI realibility for frontend-service and manifest-repo-export-service
    uses: ./.github/workflows/ci-realibilty-snippet.yml
    with:
      source_branch: automated/ci-realibility/prtest-2
      modify_frontend_service: true
      modify_export_service: true
      check_new_image_frontend_service: true
      check_new_image_export_service: true
    secrets: inherit
  prtest-3:
    needs: [prtest-2]
    name: Test CI realibility for all services
    uses: ./.github/workflows/ci-realibilty-snippet.yml
    with:
      source_branch: automated/ci-realibility/prtest-3
      modify_pkg: true
      check_new_image_cd_service: true
      check_new_image_frontend_service: true
      check_new_image_export_service: true
    secrets: inherit
  notify-results:
    name: Notify results
    needs: [prtest-1, prtest-2, prtest-3]
    runs-on: ubuntu-latest
    steps:
      - name: Notify results
        run: |
          echo "Failed results for prtest-1: ${{ needs.prtest-1.outputs.failed_results }}"
          echo "Failed results for prtest-2: ${{ needs.prtest-2.outputs.failed_results }}"
          echo "Failed results for prtest-3: ${{ needs.prtest-3.outputs.failed_results }}"