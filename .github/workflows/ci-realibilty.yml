name: ci-realibilty

on:
  push:
    branches:
      - db-prtest

jobs:
  ci-realibilty:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Lint commit message
        run: |
          make commitlint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
