name: Test CI Realibility

on:
  schedule:
    # Run on workdays at 8:00 AM
    - cron: '0 8 * * 1-5'
  push:
    branches:
      - db-prtest

jobs:
  open-pr:
    name: Open Pull Request
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: automated/ci-realibility/cd-service
      - name: Open Pull Request
        run: |
          gh pr create \
            --head automated/ci-realibility/cd-service \
            --base main \
            --title "Automated: Testing CI realibility for cd-service" \
            --body "This is an automated PR to test the CI realibility." \
            --draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        
