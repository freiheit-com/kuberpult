name: ci-realibilty

on:
  schedule:
    # Run on workdays at 8:00 AM
    - cron: '0 8 * * 1-5'
  push:
    branches:
      - db-prtest

jobs:
  ci-realibilty:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Lint commit message
        run: |
          make commitlint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
