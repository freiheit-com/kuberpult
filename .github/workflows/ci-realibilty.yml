name: Test CI Realibility

on:
  schedule:
    # Run on workdays at 8:00 AM
    - cron: '0 8 * * 1-5'
  push:
    branches:
      - db-prtest

jobs:
  ci-test-1:
    name: Test CI realibility for cd-service
    uses: ./.github/workflows/ci-realibilty-snippet.yml
    with:
      source_branch: automated/ci-realibility/ci-test-1
      modify_cd_service: false
      check_new_image_cd_service: false
    secrets: inherit
  notify-results:
    name: Notify results
    needs: [ci-test-1]
    runs-on: ubuntu-latest
    steps:
      - name: Notify results
        run: |
          echo "Failed results for ci-test-1: ${{ needs.ci-test-1.outputs.failed_results }}"

          EMOJI_RESULT_OVERALL=":check-mark:"
          EMOJI_RESULT_CI_TEST_1=":check-mark:"
          if [ -n "${{ needs.ci-test-1.outputs.failed_results }}" ]; then
            EMOJI_RESULT_CI_TEST_1=":x:"
            EMOJI_RESULT_OVERALL=":x:"
          fi

          MSG="*CI Realibility Test Results*"
          MSG+="\n*Test:* \`ci-test-1\` (cd-service) - $EMOJI_RESULT_CI_TEST_1"
          if [ -n "${{ needs.ci-test-1.outputs.failed_results }}" ]; then
            MSG+="\n*Failed Results:* \n\`\`\`${{ needs.ci-test-1.outputs.failed_results }}\n\`\`\`"
          fi

          JSON_PAYLOAD=$(jq -n --arg text "$MSG" '{text: $text}')

          curl \
            --request POST \
            --header "Content-Type: application/json" \
            --data "$JSON_PAYLOAD" \
            --fail \
            "${{ secrets.SLACK_WEBHOOK_SRE_ALERTS_INTERNAL }}"
