name: Test CI Realibility

on:
  schedule:
    # Run on workdays at 8:00 AM
    - cron: '0 8 * * 1-5'
  push:
    branches:
      - db-prtest

jobs:
  open-pr:
    name: Open Pull Request
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: automated/ci-realibility/cd-service
      - name: Open Pull Request
        run: |
          BASE_BRANCH=main
          SOURCE_BRANCH=automated/ci-realibility/cd-service

          PR_URL=$(gh pr list --head $SOURCE_BRANCH --base $BASE_BRANCH --json url --jq '.[0].url')
          if [ -n "$PR_URL" ]; then
            echo "The PR already exists. Close the current PR before creating a new one."
            gh pr close $PR_URL
          fi
          gh pr create \
            --head $SOURCE_BRANCH \
            --base $BASE_BRANCH \
            --title "Automated: Test CI realibility for $SOURCE_BRANCH" \
            --body "This is an PR automatically created to test the CI realibility." \
            --draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        
