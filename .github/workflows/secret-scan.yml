name: "Gitleaks Secret Scanning"
on:
  push:
    branches:
      - "**"
  pull_request:
jobs:
  scan:
    name: "Scan for secrets"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
  send-alert:
    name: "Send alert in case secret is detected"
    if: ${{ failure() }}
    needs: scan
    runs-on: ubuntu-latest
    steps:
    - name: Run curl to the Slack webhook
      run: |
        curl \
        --request POST \
        --header "Content-Type: application/json" \
        --data '{"text": "⚠⚠⚠ *SECRET LEAK ALERT* ⚠⚠⚠\n\nGitleaks detected a secret pushed to the Kuberpult repository. Navigate to the <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|failing run> page to inspect the alert.\n\nIf the alert is a false positive, then make sure to add an allow rule for it under `.gitleaksignore`."}' \
        --fail \
        "${{ secrets.SLACK_WEBHOOK_SRE_ALERTS_INTERNAL }}"
