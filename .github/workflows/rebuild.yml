name: Rebuild Kuberpult with an old semantic version
on:
  push:
    branches:
      - "db-**"
  workflow_dispatch:
    inputs:
      ref:
        required: false
        default: 'v13.44.0'
        type: string
        description: "The SemVer tag to rebuild (e.g., v1.0.0)"

jobs:
  rebuild:
    name: Rebuild Kuberpult with an old semantic version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: "${{ inputs.ref }}"
      - name: Validate Ref parameter
        run: |
          if [[ ! ${{ inputs.ref }} =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "'${{ inputs.ref }}' is not a valid SemVer (e.g., v1.0.0)."
            exit 1
          fi
      - name: Output the Ref parameter
        run: |
          echo "The provided ref is: ${{ inputs.ref }}"
          echo "The current checked-out SHA is: $(git rev-parse HEAD)"
      - name: Run helm chart tests
        run: |
          make -C charts/kuberpult test-helm
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.FDC_DEV_ENV_CI_IMAGE_READER }}"
          create_credentials_file: true
          export_environment_variables: true
      - name: Login to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: europe-west3-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_ARTIFACT_REGISTRY_PUSH_JSON_KEY }}
      - name: Re-tag service images with release version for google docker registry
        run: |
          echo 'If this step fails, ensure that the main github action is done. We rely on it to get the docker images.'
          git fetch --tags # this should have been done by the checkout action before.
          make tag-release-images RELEASE_IMAGE_TAG=$RELEASE_IMAGE_VERSION
        env:
          RELEASE_IMAGE_VERSION: ${{ inputs.ref }}
      - name: Re-tag CLI service image with release version for google docker registry
        run: |
          echo 'If this step fails, ensure that the main github action is done. We rely on it to get the docker images.'
          git fetch --tags # this should have been done by the checkout action before.
          make tag-cli-release-image RELEASE_IMAGE_TAG=$RELEASE_IMAGE_VERSION
        env:
          RELEASE_IMAGE_VERSION: ${{ inputs.ref }}
