  check-built-image:
    name: "Check built image on registry"
    # needs: [trigger-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_branch }}
      - uses: warjiang/setup-skopeo@main
        with:
          version: latest
      - name: Set image tag
        run: |
          IMAGE_TAG="pr-$(make version)"
          echo "Published image tag: $IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
      - name: Check built image for cd-service
        run: |
          IMAGE_TAG="pr-v13.44.13-1-gbc6b7947"
          IMAGE_NAME="europe-west3-docker.pkg.dev/fdc-public-docker-registry/kuberpult/kuberpult-cd-service"
          [[ "$(skopeo inspect -f '{{.Digest}}' docker://$IMAGE_NAME:main" == "$(skopeo inspect -f '{{.Digest}}' docker://$IMAGE_NAME:$IMAGE_TAG)" ]] && echo "Identical" || echo "Different"
          
        
          
        
