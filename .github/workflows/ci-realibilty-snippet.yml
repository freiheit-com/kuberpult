name: Test CI Realibility

on:
  schedule:
    # Run on workdays at 8:00 AM
    - cron: '0 8 * * 1-5'
  workflow_call:
    inputs:
      base_branch:
        required: false
        default: main
        type: string
      source_branch:
        required: true
        type: string

      # enable services to be modified
      modify_cd_service:
        required: false
        default: false
        type: boolean
      modify_frontend_service:
        required: false
        default: false
        type: boolean
      modify_export_service:
        required: false
        default: false
        type: boolean
      modify_pkg:
        required: false
        default: false
        type: boolean
      
      # enable image checks for services
      check_image_cd_service:
        required: false
        default: false
        type: boolean
      check_image_frontend_service:
        required: false
        default: false
        type: boolean
      check_image_export_service:
        required: false
        default: false
        type: boolean

