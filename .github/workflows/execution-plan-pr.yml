name: "Execution Plan on Pull Request"
on:
  pull_request:
    branches:
      - main
jobs:
  execution-plan:
    uses: ./.github/workflows/execution-plan-snippet.yml
    with:
      trigger: pull-request
    secrets: inherit

  integration-tests:
    needs: [execution-plan]
    uses: ./.github/workflows/integration-tests.yml
    # skip if the execution plan did not trigger rebuilding any image:
    if: ${{ needs.execution-plan.outputs.atLeastOneImageRebuilt }}
    with:
      trigger: pull-request
      fullversion: ${{ needs.execution-plan.outputs.fullversion }}
    secrets: inherit

