name: "Execution Plan on Pull Request"
on:
  pull_request:
    branches:
      - main
jobs:
  execution-plan:
    uses: ./.github/workflows/execution-plan-snippet.yml
    with:
      trigger: pull-request
    secrets: inherit

  test-helm:
    needs: [ execution-plan ] # helm tests are using the builder image
    uses: ./.github/workflows/run-helm-test.yml
    with:
      imageTagPrefix: "pr-"

  integration-tests:
    needs: [ execution-plan ]
    uses: ./.github/workflows/integration-tests.yml
    with:
      trigger: pull-request
      fullversion: ${{ needs.execution-plan.outputs.fullversion }}
      runTest: ${{ needs.execution-plan.outputs.atLeastOneImageRebuilt == 'true' }}
    secrets: inherit

  vulnerability-scan:
    needs: [ execution-plan ]
    uses: ./.github/workflows/vulnerability-scan.yml
    with:
      trigger: pull-request
      fullversion: ${{ needs.execution-plan.outputs.fullversion }}
    secrets: inherit

  gatekeeper:
    name: "All Checks Passed"
    runs-on: ubuntu-latest
    needs:
      - test-helm
      - execution-plan
      - integration-tests
      - vulnerability-scan

    # always() ensures this job runs even if a previous job fails or is skipped.
    # Without this, a failed upstream job would cause the gatekeeper to be "skipped",
    # which leaves the PR hanging in "Expected" status.
    if: always()
    steps:
      - name: Evaluate Job Results
        run: |
          # If any job failed or was cancelled, we fail the Gatekeeper.
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "❌ One or more required jobs failed or were cancelled."
            exit 1
          else
            echo "✅ All required jobs succeeded or were intentionally skipped."
            exit 0
          fi
