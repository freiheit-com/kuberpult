name: Test CI Reliability 2

on:
  schedule:
    # Run on workdays at 8:00 AM
    - cron: '0 8 * * 1-5'
  # push:
  #   branches:
  #     - db-citest

jobs:
  ci-test-2:
    name: Test CI Reliability for frontend-service and manifest-repo-export-service
    uses: ./.github/workflows/ci-reliability-snippet.yml
    with:
      source_branch: automated/ci-reliability/ci-test-2
      modify_frontend_service: true
      modify_export_service: true
      check_new_image_frontend_service: true
      check_new_image_export_service: true
    secrets: inherit
  notify-results:
    name: Notify results
    needs: [ci-test-2]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify results
        run: |
          EMOJI_RESULT_OVERALL="✅"
          EMOJI_RESULT_CI_TEST_2="✅"
          VALIDATION_ERRORS_CI_TEST_2="${{ needs.ci-test-2.outputs.failed_results }}"
          if [[ "${{ needs.ci-test-2.result }}" != "success" ]] || [[ -n "$VALIDATION_ERRORS_CI_TEST_2" ]]; then
            EMOJI_RESULT_CI_TEST_2="❌"
            EMOJI_RESULT_OVERALL="❌"
          fi

          if [[ "${{ needs.ci-test-2.result }}" != "success" ]]; then
            VALIDATION_ERRORS_CI_TEST_2="\nError occurred during CI test"
          fi

          MSG="*CI Reliability Test $EMOJI_RESULT_OVERALL*"
          MSG+="\n\n*Test:* \`ci-test-2\` $EMOJI_RESULT_CI_TEST_2 (frontend-service and manifest-repo-export-service)"
          if [ -n "$VALIDATION_ERRORS_CI_TEST_2" ]; then
            MSG+="\n\`\`\`$VALIDATION_ERRORS_CI_TEST_2\n\`\`\`"
          fi

          curl \
            --request POST \
            --header "Content-Type: application/json" \
            --data "{\"text\": \"$MSG\"}" \
            --fail \
            "${{ secrets.SLACK_WEBHOOK_SRE_ALERTS_INTERNAL }}"
