version: "2"
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - unused
    - asciicheck
    - bodyclose
    - copyloopvar
    - staticcheck
    - unconvert
    - gocritic
    - revive
    - misspell
  exclusions:
    paths:
      - pkg/publicapi
    rules:
      # MINIMIZE refers to the env var KUBERPULT_MINIMIZE_GIT_DATA — cannot use UK spelling there
      - linters: [misspell]
        path: "services/manifest-repo-export-service/pkg/cmd/server.go"
        text: "MINIMIZE"
      # rollout-service misspellings are not fixed intentionally (US-English proto/gRPC names) because the service is deprecated
      - linters: [misspell]
        path: "services/rollout-service/pkg/service/broadcast.go"
        text: "wheter"
      - linters: [misspell]
        path: "services/rollout-service"
        text: "SUCCESFUL"
  settings:
    gocritic:
      disable-all: true
      enabled-checks:
        - importShadow
    revive:
      rules:
        - name: redundant-import-alias
          severity: error
          disabled: false
    misspell:
      locale: UK
issues:
  max-same-issues: 0
  max-issues-per-linter: 0
output:
  format: tab # This is where you set the output format to 'tab'
  sort-results: true # Equivalent to --sort-results
formatters:
  enable:
    - gci
  settings:
    gci:
      sections:
        - standard # Standard packages.
        - default # Imports that are not standard and not current project.
        - prefix(github.com/freiheit-com/kuberpult) # Your local packages.
      section-separators:
        - newLine # Ensures a newline between the sections above.
run:
  tests: false
