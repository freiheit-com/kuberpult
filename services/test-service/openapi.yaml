openapi: 3.0.0
info:
  title: Test Service API
  description: This is a simple Go service API.
  version: 1.0.0
paths:
  /hello:
    get:
      summary: Returns a greeting message
      responses:
        '200':
          description: A greeting message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Hello, World!"
  /goodbye:
    get:
      summary: Returns a farewell message
      responses:
        '200':
          description: A farewell message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Goodbye, World!"
